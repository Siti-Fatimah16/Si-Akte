<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toko Makanan Lezat</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; }
    header { background: #ff7043; color: white; padding: 20px; text-align: center; }
    nav { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
    nav a { color: white; text-decoration: none; font-weight: bold; }
    .hero { text-align: center; padding: 50px; background: #ffe0b2; }
    .hero h1 { font-size: 40px; }
    .btn { background: #ff7043; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; }
    .menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
    .card { border: 1px solid #ddd; padding: 15px; border-radius: 10px; text-align: center; }
    .card img { width: 100%; border-radius: 10px; }
    footer { background: #333; color: white; text-align: center; padding: 15px; }
  </style>
</head>
<body><header>
  <h1>Toko Hanum's Foods</h1>
  <nav>
    <a href="#">Beranda</a>
    <a href="#menu">Menu</a>
    <a href="#kontak">Kontak</a>
  </nav>
</header><section class="hero">
  <h1>Selamat Datang di Toko Kami</h1>
  <p>Nikmati berbagai makanan & minuman lezat dengan harga terjangkau</p>
  <button class="btn">Pesan Sekarang</button>
</section><section id="menu" class="menu">
  <div class="card">
    <img src="https://via.placeholder.com/200" alt="Makanan 1">
    <h3>bolu ketan</h3>
    <p>Rp 5.000</p>
  </div>
  <div class="card">
    <img src="https://via.placeholder.com/200" alt="Makanan 2">
    <h3>dimsum ayam</h3>
    <p>Rp 12.000</p>
  </div>
  <div class="card">
    <img src="https://via.placeholder.com/200" alt="Makanan 3">
    <h3>thai tea</h3>
    <p>Rp 5.000</p>
  </div>
</section><footer id="kontak">
  <p>Hubungi kami: 0881-0255-38778-</p>
  <p>Alamat: Jl. soetami kp. lontar</p>
</footer></body>
</html>
